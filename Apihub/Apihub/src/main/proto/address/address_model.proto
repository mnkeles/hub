syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.address";
option java_outer_classname = "AddressModelProto";
option objc_class_prefix = "TIAMAS";

package tr.com.togg.tdp.tma.ms.address;

import "common_model.proto";
import "common_enum.proto";
import "protobuf_validations/validation.proto";

message GetCitiesRequest {
  common.model.RequestHeader header = 1; // RequestHeader are the fields that our requests coming to the service receive in common
  int32 country = 2; // country id
}

message GetCountriesRequest {
  common.model.RequestHeader header = 1;
}

message GetSubProvincesRequest {
  common.model.RequestHeader header = 1;
  int32 city_id = 2;
}

message GetAddressDetailRequest {
  common.model.RequestHeader header = 1;
  int64 address_id = 2;
}

//Values of client address
message ClientAddress {
  common.model.GenericCodeType city = 1;
  common.model.GenericCodeType country = 2;
  string address = 3;
  common.model.GenericCodeType sub_province = 4;
  int64  address_id = 5;
  string neighbourhood = 6;
  string postal_code = 7;
  string alias =8; // label of address
  repeated common.model.GenericParameter parameters = 9; // used for additional parameters like tax info
}

message SelectedAddress{
  int64 billing_address_id = 1; // customer address id reference
  int64 shipment_address_id = 2 [(validations.optional) = true]; // customer shipment address id reference
  int64 installment_address_id = 3 [(validations.optional) = true]; // customer installment address id reference
}
