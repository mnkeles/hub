syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.common.model";
option java_outer_classname = "ToggMsCommonProto";
option objc_class_prefix = "TOGGMSCOMMON";

package tr.com.togg.tdp.common.model;

import "common_enum.proto";

/**
 * RequestHeader are the fields that our requests coming to the service receive in common
 */
message RequestHeader {
  string tenant_id = 1; // Required with "toggId"
  oneof user {
    string user_id = 2; // Required Togg ID unique ID.
    int64 customer_id = 5;
  }
  common.enums.UserLanguage language = 3; // Not Required Client user information
  common.enums.Channel channel = 4; // Not Required Client channel information
}

message ResponseHeader {
  string code = 1;
  string desc = 2;
}

message RuleMessage {
  string error_code = 1;
  string message = 2;
  string message_level = 3;
}

message OperationResult {
  string result_code = 1;
  string operation_result_code = 2;
  string description = 3;
  repeated RuleMessage re_message_list = 4;
}

message GenericResponse {
  string data = 1;
  OperationResult operation_result = 2;
}

// Represents a whole or partial calendar date, such as a birthday. The time of
// day and time zone are either specified elsewhere or are insignificant. The
// date is relative to the Gregorian Calendar. This can represent one of the
// following:
message CommonDate {
  // Year of the date. Must be from 1 to 9999, or 0 to specify a date without
  // a year.
  int32 year = 1;

  // Month of a year. Must be from 1 to 12, or 0 to specify a year without a
  // month and day.
  int32 month = 2;

  // Day of a month. Must be from 1 to 31 and valid for the year and month, or 0
  // to specify a year by itself or a year and month where the day isn't
  // significant.
  int32 day = 3;
}

message GenericInfoType{ // Used for all generic details
  int64 id = 1;
  string name = 2;
  string short_code = 3;
  string value = 4;
  string description = 5;
}

message GenericCodeType{ // Used for all generic details
  int64 id = 1;
  string code = 2;
  string name = 3;
}

message GenericParameter{
  // Used for all generic code-value params
  string code = 1;
  string value = 2;
  string name = 3;
  string type = 4; // CHARACTER ,  IMAGE
}
