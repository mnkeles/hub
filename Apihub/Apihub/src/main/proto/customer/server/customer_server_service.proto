syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.customer.server";
option java_outer_classname = "CustomerServerServiceProto";
option objc_class_prefix = "TIAMAS";

package tr.com.togg.tdp.tma.ms.customer.server;

import "customer/server/customer_server_model.proto";
import "google/protobuf/wrappers.proto";

service CustomerServerService {
  rpc GetCustomerReferenceCount (GetCustomerReferenceCountRequest) returns (google.protobuf.Int64Value);
  rpc IsCustomerProfileCompleted (IsCustomerProfileCompletedRequest) returns (google.protobuf.BoolValue);
  rpc GetCustomerIdByOpenId (GetCustomerIdByOpenIdRequest) returns (google.protobuf.Int64Value);
  rpc GetOpenIdByCustomerId (GetOpenIdByCustomerIdRequest) returns (google.protobuf.StringValue);
}

service CustomerAccountServerService {
  rpc CheckCustomerAccountOwnership(CheckCustomerAccountOwnershipRequest) returns (google.protobuf.BoolValue);
}
