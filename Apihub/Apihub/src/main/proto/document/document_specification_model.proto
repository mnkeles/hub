syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.document.v1";
option java_outer_classname = "DocumentSpecificationModelProto";
option objc_class_prefix = "TIAMAS";

package tr.com.togg.tdp.tma.ms.document.specification.v1;

import "common_model.proto";
import "common_enum.proto";
import "google/protobuf/timestamp.proto";

message ListDocumentSpecificationsRequest{
  common.model.RequestHeader header = 1;
}

message CreateDocumentSpecificationsRequest{
  common.model.RequestHeader header = 1;
  DocumentSpecification document = 2; // mandatory
  bool required = 3;
  int32 page_count = 4;
}

message CreateDocumentSpecificationsResponse{
  string document_specification_id = 1;
}

message DocumentSpecification{
  string id = 1;
  string href = 2; // mandatory
  string description = 3; // mandatory
  bool isBundle = 4;
  google.protobuf.Timestamp update_date = 5;
  string name = 6; // mandatory
  string code = 7;
  repeated DocumentSpecificationAttachment attachments = 8;
}

message DocumentSpecificationAttachment {
  string id = 1;
  string href = 2;
  string attachment_type = 3;
  string content = 4;
  string description = 5;
  string mime_type = 6;
  string name = 7;
  string url = 8;
}
