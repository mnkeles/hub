syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.insurance";
option java_outer_classname = "InsuranceModelProto";
option objc_class_prefix = "TIAMAS";

package tr.com.togg.tdp.tma.ms.insurance;

import "common_model.proto";

message CreateVehicleOrderInsuranceSessionRequest {
  common.model.RequestHeader header = 1;
  int64 order_id = 2;
  InsuranceAgentType insurance_agent = 3;
}

message ListEditableInsuranceCharDefinitionsRequest {
  common.model.RequestHeader header = 1;
}

message CreateVehicleOrderInsuranceSessionResponse {
  string redirect_url = 1;
}

enum InsuranceAgentType {
  INSURANCE_AGENT_TYPE_UNSPECIFIED = 0;
  SIGORTAYERI = 1;
}
