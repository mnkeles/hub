syntax = "proto3";

option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.dp.ms.legalagreements.model.core.v2";
option java_outer_classname = "LegalAgreementsModelCoreProto";
option objc_class_prefix = "LA";

package togg.tdp.dp.ms.legalagreements.model.core.v2;

import "legal_agreement/dp_ms_legalagreement_model_enums.proto";
import "google/protobuf/timestamp.proto";

message LegalAgreementDocument {
  string id = 1;
  string tenant_id = 2;
  model.enums.v2.LegalDocumentType type = 5;
  string version = 6;
  string version_notes = 7;
  repeated LegalAgreementDocumentResource resources = 8;
  model.enums.v2.Country country = 9;
  bool is_enabled = 10;
  repeated model.enums.v2.UserActionType possible_user_actions = 11;
  model.enums.v2.UserActionType required_user_action = 12;
}

message LegalAgreementDocumentResource {
  model.enums.v2.Language language = 2;
  string url = 3;
  string name = 4;
  string description = 5;
}

message UserAction {
  string id = 1;
  string user_id = 2;
  string tenant_id = 3;
  string version = 4;
  string legal_document_id = 5;
  model.enums.v2.Channel channel = 6;
  model.enums.v2.UserActionType type = 7;
  model.enums.v2.Language language = 8;
}

message MetaData {
  google.protobuf.Timestamp created_at = 1;
  string created_by = 2;
  google.protobuf.Timestamp updated_at = 3;
  string updated_by = 4;
  google.protobuf.Timestamp deleted_at = 5;
  string deleted_by = 6;
  bool is_deleted = 7;
}