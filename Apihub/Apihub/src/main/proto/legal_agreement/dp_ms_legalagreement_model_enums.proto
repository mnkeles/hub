syntax = "proto3";

option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.dp.ms.legalagreements.model.enums.v2";
option java_outer_classname = "LegalAgreementsModelEnumsProto";
option objc_class_prefix = "LA";

package togg.tdp.dp.ms.legalagreements.model.enums.v2;

enum Language {
  USER_LANGUAGE_UNSPECIFIED = 0;
  TR = 1;
  EN = 2;
  DE = 3;
  reserved 4 to 99;
  OTHER_LANGUAGE = 100;
}

enum Channel {
  CHANNEL_UNSPECIFIED = 0;
  MOBILE = 1;
  WEB_PORTAL = 2;
  CAR = 3;
  ALL = 4;
