  OTHER_USER_ACTION_TYPE = 100;
}

enum LegalDocumentType {
  LEGAL_DOCUMENT_TYPE_UNSPECIFIED = 0;
  DATA_PROTECTION = 1;
  DATA_PRIVACY = 2;
  DATA_USAGE = 3;
  reserved 4 to 99;
  OTHER_DOCUMENT_TYPE = 100;
}


enum Country {
  COUNTRY_UNSPECIFIED = 0;
  TURKEY = 1;
  GERMANY = 2;
  UK = 3;
  reserved 4 to 99;
  OTHER_COUNTRY = 100;
}
