syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.program.events.server";
option java_outer_classname = "ProgramEventsServerServiceProto";
option objc_class_prefix = "TIAMAS";

package tr.com.togg.tdp.tma.ms.program.events.server;

import "program_event/server/program_event_server_model.proto";
import "program_event/program_event_model.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

service ProgramEventServerService {
  rpc ListEventTasks (ListEventTasksRequest) returns (stream EventTaskDetail);
  rpc GetProgramMember (GetProgramMemberRequest) returns (GetProgramMemberResponse);
  rpc GetProgramMemberTaskId (GetProgramMemberTaskIdRequest) returns (google.protobuf.Int64Value);
  rpc UpdateProgramMemberTaskStatus (UpdateProgramMemberTaskStatusRequest) returns (google.protobuf.Empty);
  rpc GetProgramDetail (GetProgramDetailRequest) returns (ProgramDetail);

}

