syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.wallet.digital";
option java_outer_classname = "DigitalWalletServiceProto";
option objc_class_prefix = "TIAMAS";

package tr.com.togg.tdp.tma.ms.wallet.digital.client;

import "wallet/digital_wallet_model.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

service DigitalWalletService {
  rpc GetDigitalAccount (GetDigitalAccountRequest) returns (GetDigitalAccountResponse); // Returns the Digital Wallet Details -customer/toggId
  rpc CreateDigitalWallet (CreateDigitalWalletRequest) returns (CreateDigitalWalletResponse); // Create Digital Wallet Using GFT APIs - customer
}

service DigitalWalletTransactionService{
  rpc GetGasFee(GetGasFeeRequest) returns (GetGasFeeResponse); // Dry Run Transaction
  rpc SendAsset (SendAssetRequest) returns (SendAssetResponse); //Send Transaction
  rpc ListTransactions (ListTransactionsRequest) returns (stream TransactionHistoryDetail);// Returns the Digital Wallet Transaction List
  rpc ListTransactionsByFilter (ListTransactionsByFilterRequest) returns (stream TransactionHistoryDetail);
}

service DigitalWalletNftService{
  rpc GetNftGasFee(GetNftGasFeeRequest) returns (GetGasFeeResponse); // Dry Run Transaction
  rpc SendNftAsset (SendNftAssetRequest) returns (SendNftAssetResponse); //Send NFT
  rpc ListUserNfts (ListUserNftsRequest) returns (stream NftDetail);// Returns the User NFT List Which is transferred to their Wallet
  rpc MintNftMagnet(MintNftMagnetRequest) returns (google.protobuf.Empty);
  rpc GetNftMagnetGasFee(GetNftMagnetGasFeeRequest) returns (GetGasFeeResponse);// Dry Run Transaction
  rpc CheckUserAvailableForPreOrder (CheckUserAvailableForPreOrderRequest) returns (google.protobuf.BoolValue);// Returns the GFT nft/canPreOrder API
}

service DigitalWalletTapService{
  rpc ListUserTaps(ListUserTapsRequest) returns (stream TapDetail);// Get Poaps Trigger /poaps/{toggId}
  rpc MintTap(MintTapRequest) returns (google.protobuf.Empty); // Mint a Tap  Trigger /api/v1/transaction/mint
  rpc GetTapMetadata(GetTapMetadataRequest) returns (GetTapMetadataResponse); // Get Tap Metadata Trigger GET /api/v1/metadata/key/:key
}
