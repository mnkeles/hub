syntax = "proto3";

option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.configurations.component.service";
option java_outer_classname = "ComponentPermissionServiceProto";
option objc_class_prefix = "MS";

package tr.com.togg.tdp.tma.ms.configurations.component.service.client;

import "google/protobuf/wrappers.proto";
import "configurations/component_permission_model.proto";


service UserComponentPermission {
  rpc HasUserComponentPermission(HasUserComponentPermissionRequest) returns (google.protobuf.BoolValue);
  rpc ListUserComponentPermissions(ListUserComponentPermissionRequest) returns (stream google.protobuf.StringValue);
}
