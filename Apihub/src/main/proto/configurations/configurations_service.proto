syntax = "proto3";

option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.configurations.service";
option java_outer_classname = "ConfigurationsServiceProto";
option objc_class_prefix = "MS";

package tr.com.togg.tdp.tma.ms.configurations.service.client;

import "google/protobuf/empty.proto";
import "configurations/configurations_model.proto";
import "common_model.proto";

//The service where configurations are list, get and listen
service ConfigurationsService {
  //Lists configurations
  rpc ListConfigurations(google.protobuf.Empty) returns (ListConfigurationsResponse);
  //Gets configuration
  rpc GetConfiguration(GetConfigurationRequest) returns (GetConfigurationResponse);
  //Listen configuration
  rpc ListenConfigurations(ListenConfigurationsRequest) returns (stream ListenConfigurationsResponse);
}

service UtilityService {
  rpc ListCurrency(ListCurrencyRequest) returns (stream Currency);
  rpc ListDeliveryPoints(ListDeliveryPointsRequest) returns (stream common.model.GenericInfoType);
}