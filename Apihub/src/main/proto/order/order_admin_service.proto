syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.order.admin";
option java_outer_classname = "OrderAdminServiceProto";

package tr.com.togg.tdp.tma.ms.order.admin;

import "order/order_model.proto";

service VehicleOrderAdminService {
  rpc GetCustomerVehicleOrderDetail (GetCustomerOrderDetailRequest) returns (GetCustomerVehicleOrderDetailResponse);
}

service OrderAdminService {
  rpc GetOrderPaymentDetail (GetOrderPaymentDetailRequest) returns (GetOrderPaymentDetailResponse);
}
