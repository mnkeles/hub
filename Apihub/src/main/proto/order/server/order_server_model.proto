syntax = "proto3";
option java_multiple_files = true;
option java_package = "tr.com.togg.tdp.tma.ms.order.server";
option java_outer_classname = "OrderServerModelProto";
option objc_class_prefix = "TIAMAS";

package tr.com.togg.tdp.tma.ms.order.server;

import "common_model.proto";
import "common_enum.proto";
import "order/order_model.proto";

message ProcessBulkPreOrderRequest {
  common.model.RequestHeader header = 1;
}

message ProcessOrderCharUpdateRequest {
  common.model.RequestHeader header = 1;
  common.enums.OrderFlowTypes order_flow_type = 2;
  repeated Parameter parameters = 5;
}

message InitializePreOrderPartialCancelOrderRequest{
  common.model.RequestHeader header = 1;
  int64 order_id = 2;
}

message ProcessOrderBasketPriceUpdateRequest{
  common.model.RequestHeader header = 1;
  int64 order_id = 2;
}

message CancelOrderRequest {
  common.model.RequestHeader header = 1;
  int64 order_id = 2;
}