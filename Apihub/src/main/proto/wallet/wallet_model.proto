  //  "failUrl": "https:= //www.paycell.com.tr/fail"// paycell manage this field not mandatory
}

message TopUpWalletMoneyTransferResponse {
  string session_id=1;
  string order_id=2;
  string access_token = 4;
}

message Bank {
  string bank_name = 1;
  string bank_logo = 2;
  string acquirer_id = 3;
}

message TopUpBankDetail {
  string acquirer_id = 1;
  string name = 2;
  string logo_url = 3;
}

message GetContactlessDetailRequest{
  common.model.RequestHeader header = 1;
  oneof qr_info {
    string content = 2;
    string transaction_id = 3;
  }
}

message GetContactlessDetailResponse{
  string qr_transaction_id = 1; // paycell service response qrTransactionId field
  double amount  = 2; // paycell service response amount field
  string merchant_name = 3; // paycell service response extraParameters.key == merchantName extraParameters.value  field will be mapped
  string currency_code = 4; // paycell service response curency field will be mapped via using UtilityService/ListCurrency method --> currency.numeric_code will be the same as payycell response
}

message MakeContactlessPaymentRequest{
  common.model.RequestHeader header = 1;
  string reference_transaction_id = 2;
}

