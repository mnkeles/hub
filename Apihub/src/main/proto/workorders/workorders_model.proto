/*
While listing, work orders can be filtered out.
Provide a map of key and value pairs, where the key is the data field and the value is the data.
The query string ANDs all of the provided map entries.

Examples:
Filter by license plate:
  key: appointment.activeAppointment.product.productNr and value: 34ABC123
Filter by vehicle chassis number:
  key: appointment.activeAppointment.product.productSerialNr and value: 123456ABC
Filter by if work order is planned:
  key: isPlanned and value: true
Filter by service point:
  key: place.id and value: S025
Filter by category:
  key: category and value: MECHANICAL
Filter by work order state(status):
  key: state and value: CUSTOMERAPPROVALPENDING
Filter by insurance firm:
  key: insurance.firm and value: insurance-firm-name
Filter by if vehicle in in the workshop:
  key: inWorkshop and value: true

To learn more about the possible filters please refer to the Etiya WorkOrder TMF REST API data model
*/
message ListWorkOrdersRequest {
  common.model.RequestHeader header = 1;
  map<string, string> filters = 2;
  int32 page_number = 3;
  int32 page_size = 4;
}

/*
------------------------------------------------
---- Sample ListWorkOrdersRequestV2 Request ----
------------------------------------------------

{
  "header": {
    "tenantId": "toggid",
    "userId": "85f2500b-9a2a-4f37-9639-9fd7eb564116",
    "language": "EN",
    "channel": "APPOINTMENT"
  },

  "filters": {
    "orderDate": { //orderDate filter applied for with given date interval
      "values": [
        "2023-08-18",
        "2023-08-20"
      ],
      "queryOperator": ["GT","LT"],
      "dataType":"DATE"
    },

    "state":{ // state filtered for equals in given list
      "values": [
        "ACCEPTANCEAPPROVALPENDING",
        "WAITINGFORPAYMENT"
      ]
    }
  }
}

*/
message ListWorkOrdersRequestV2 {
  common.model.RequestHeader header = 1;
  map<string, ListFilterValue> filters = 2;
  int32 page_number = 3;
  int32 page_size = 4;
}

message ListFilterValue{
  repeated string values = 1;
  // comparison operator - upper / lower bound ( lt / gt ), not eq, null, not null checks
  repeated QueryOperator query_operator = 2;
  QueryParameterDataType data_type = 3;
}

message ListWorkOrdersResponse {
  repeated WorkOrder work_orders = 1;
}

